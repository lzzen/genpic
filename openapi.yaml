openapi: "3.1.0"

info:
  title: Genpic Platform API
  version: "0.1.0"
  description: |
    Genpic image generation platform HTTP API.

    **Primary generation**: `POST /api/generate` — the server routes `model` to
    OpenAI, Gemini, or Wan adapters. Each request carries `base_url` and `api_key`
    for your upstream aggregator (same as the embedded web UI).

    **Session authentication** (when MySQL is configured):
    - Cookie `genpic_session` — HTTP-only session token set by `POST /api/auth/register`
      or `POST /api/auth/login`. Send requests with `credentials: include` from browsers.
    - Authenticated requests resolve the signed-in user’s id for job ownership.

    **Job owner headers** (optional; still supported):
    - `X-Genpic-User-Id` — opaque user id (legacy / external auth integration).
    - `X-Genpic-Session` — stable per-browser id for anonymous history; required for
      migrating anonymous jobs on first login when sent alongside login/register.
    Jobs are listed and fetched only when the same cookie/session/user scope matches.

    Put the service behind your own gateway or network controls for production where needed.
    Server defaults in `config.yaml` wire adapters but are never returned to callers.
  contact:
    name: Genpic Engineering
  license:
    name: Proprietary

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://imgapi.example.com
    description: Production (replace with your origin)

tags:
  - name: models
    description: List available image generation models
  - name: generate
    description: Primary image generation (POST /api/generate)
  - name: chat
    description: OpenAI chat completions path for image generation (POST /v1/chat/completions)
  - name: jobs
    description: Async job status (`GET /jobs`, `GET /jobs/{id}`)
  - name: auth
    description: User registration, login, session cookie, and privacy settings
  - name: community
    description: Public artwork feed and visibility controls
  - name: health
    description: Service health and liveness

paths:

  # ── Health ─────────────────────────────────────

  /health:
    get:
      operationId: getHealth
      tags: [health]
      summary: Liveness check
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ── Models ─────────────────────────────────────

  /models:
    get:
      operationId: listModels
      tags: [models]
      summary: List available image-generation models
      description: |
        Returns the models this deployment exposes.
        Response shape mirrors OpenAI `GET /v1/models` for tooling compatibility.
      responses:
        "200":
          description: Model list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelList"

  # ── Generate (primary) ─────────────────────────

  /api/generate:
    post:
      operationId: apiGenerate
      tags: [generate]
      summary: Generate images (async job + poll, or sync without job store)
      description: |
        **cmd/genpic** (job store always enabled): enqueues a generation job and returns
        **202 Accepted** with a job object (`id`, `status`, …). Poll `GET /jobs/{id}`
        until `status` is `succeeded` or `failed`; on success, `data` holds images
        (`url` and/or `b64_json`, `mime_type`, `revised_prompt`).

        **mvp_lite** (no job store): waits for the upstream and returns **200** with
        `created`, `data`, and `x_provider` (same normalized shape as the synchronous path).

        **Model routing** (by `model` id): OpenAI Images, Gemini generateContent, or Wan
        multimodal — see provider docs in-repo.

        Send `X-Genpic-Session` and/or `X-Genpic-User-Id` so jobs are scoped for listing.
      parameters:
        - $ref: "#/components/parameters/GenpicUserId"
        - $ref: "#/components/parameters/GenpicSession"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiGenerateRequest"
            examples:
              gpt_image:
                summary: GPT Image 2 — basic text-to-image
                value:
                  base_url: "https://api.openai.com/v1"
                  api_key: "sk-…"
                  model: gpt-image-2
                  prompt: "A serene mountain lake at golden hour, photorealistic"
                  n: 1
                  size: "1024x1024"
                  quality: high
                  response_format: url
              gemini_flash:
                summary: Gemini 2.5 Flash — portrait
                value:
                  base_url: "https://generativelanguage.googleapis.com/v1beta"
                  api_key: "…"
                  model: gemini-2.5-flash-image
                  prompt: "Studio portrait of a fox wearing a graduation cap"
                  n: 1
                  aspect_ratio: "1:1"
                  image_size: "512"
                  response_format: b64_json
      responses:
        "200":
          description: Images returned synchronously (e.g. MVP Lite)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageGenerationResponse"
        "202":
          description: Job accepted (cmd/genpic); poll GET /jobs/{id}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationJob"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "502":
          $ref: "#/components/responses/UpstreamError"

  # ── Chat completions (M2) ──────────────────────

  /v1/chat/completions:
    post:
      operationId: chatCompletions
      tags: [chat]
      summary: Generate images via OpenAI-compatible chat completions
      description: |
        Translates a standard OpenAI chat completions request into an image generation
        call. Intended for Cherry Studio, AI as Workspace, Lobe Chat, and any
        OpenAI-SDK client that only speaks the chat completions surface.

        **Routing**: the `model` field must identify an image-generation model
        (e.g. `gemini/gemini-2.5-flash-image`, `openai/gpt-image-2`, `wan/wan2.7-image`).

        **Credentials**:
        - `Authorization: Bearer <token>` — forwarded as the upstream `api_key`.
        - `X-Base-Url` header — overrides the server-configured upstream base URL.
        - If the server already has credentials in `config.yaml`, the Bearer token
          and header are optional (Mode A: server-side key).

        **Reference images**: include `type:"image_url"` parts with `data:` URIs in
        the last user message content to supply reference images.

        **Limitations**: `stream:true` is not supported; the response is always
        synchronous. Generation can take 30–180 s depending on the model.
      security: []
      parameters:
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
          description: |
            `Bearer <upstream_api_key>` — forwarded to the upstream provider.
            Optional when the server has credentials configured in config.yaml.
        - name: X-Base-Url
          in: header
          required: false
          schema:
            type: string
          description: Override the upstream base URL for this request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionsRequest"
      responses:
        "200":
          description: Synchronous chat completions response with generated image(s)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "502":
          $ref: "#/components/responses/UpstreamError"

  # ── Jobs ───────────────────────────────────────

  /jobs/{job_id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get generation job status and result
      description: |
        Poll after `202 Accepted` from `POST /api/generate`. When `status == succeeded`,
        `data` contains generated images.

        Returns **404** when the job exists but does not belong to the caller's
        scope (session cookie, `X-Genpic-User-Id`, or `X-Genpic-Session`).
      parameters:
        - $ref: "#/components/parameters/GenpicUserId"
        - $ref: "#/components/parameters/GenpicSession"
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: Job `id` from the `202` response body
      responses:
        "200":
          description: Job record (any status)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationJob"
        "404":
          $ref: "#/components/responses/NotFound"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List recent generation jobs (newest first)
      description: |
        Jobs are filtered by caller scope: authenticated users (via `genpic_session`
        cookie) see their jobs; with `X-Genpic-User-Id` only that user's jobs;
        with `X-Genpic-Session` only anonymous jobs for that session; when neither
        applies as owner scope, only legacy jobs with no stored owner are listed.
      parameters:
        - $ref: "#/components/parameters/GenpicUserId"
        - $ref: "#/components/parameters/GenpicSession"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor (opaque, from previous response)
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/JobStatus"
      responses:
        "200":
          description: Paginated job list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobList"

  # ── Auth & settings ────────────────────────────

  /api/auth/register:
    post:
      operationId: authRegister
      tags: [auth]
      summary: Register a new account (sets session cookie)
      security: []
      parameters:
        - $ref: "#/components/parameters/GenpicSession"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRegisterRequest"
      responses:
        "201":
          description: User created; genpic_session cookie set
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "503":
          description: Auth disabled (no database configured)

  /api/auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      summary: Log in (sets session cookie)
      security: []
      parameters:
        - $ref: "#/components/parameters/GenpicSession"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: Login succeeded; genpic_session cookie set
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Auth disabled (no database configured)

  /api/auth/logout:
    post:
      operationId: authLogout
      tags: [auth]
      summary: Log out (clears session cookie)
      security: []
      responses:
        "200":
          description: Session cleared
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [logged_out]

  /api/auth/me:
    get:
      operationId: authMe
      tags: [auth]
      summary: Current authenticated user
      parameters:
        - $ref: "#/components/parameters/GenpicSessionCookie"
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Auth disabled

  /api/user/settings:
    get:
      operationId: getUserSettings
      tags: [auth]
      summary: Read privacy settings for the signed-in user
      parameters:
        - $ref: "#/components/parameters/GenpicSessionCookie"
      responses:
        "200":
          description: Settings object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Auth disabled
    put:
      operationId: updateUserSettings
      tags: [auth]
      summary: Update privacy settings (partial body allowed)
      parameters:
        - $ref: "#/components/parameters/GenpicSessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettingsPatch"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Auth disabled

  /api/jobs/{job_id}/visibility:
    put:
      operationId: setJobVisibility
      tags: [community]
      summary: Set job visibility for community feed (author only)
      parameters:
        - $ref: "#/components/parameters/GenpicSessionCookie"
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: Job id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobVisibilityBody"
      responses:
        "200":
          description: Updated job (includes prompt and params for owner)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationJob"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/community/feed:
    get:
      operationId: communityFeed
      tags: [community]
      summary: Paginated public jobs for discovery
      description: |
        Returns jobs with visibility public. Prompt visibility for anonymous callers
        follows each author's prompt_public setting; logged-in users see full prompts.
        Params for remix flows are returned only when the caller is authenticated.
      parameters:
        - $ref: "#/components/parameters/GenpicSessionCookie"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor from next_cursor
      responses:
        "200":
          description: Feed page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityFeed"

components:

  parameters:
    GenpicUserId:
      name: X-Genpic-User-Id
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
      description: |
        Opaque user identifier when the caller is authenticated outside Genpic.
        Jobs created with this header are listed only when the same value is sent.
    GenpicSession:
      name: X-Genpic-Session
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
      description: |
        Stable random id per browser or device (for example a UUID in localStorage).
        Used for anonymous generation history when `X-Genpic-User-Id` is not set.
    GenpicSessionCookie:
      name: genpic_session
      in: cookie
      required: false
      schema:
        type: string
      description: |
        HTTP-only session cookie returned by register/login. Optional on routes that
        treat anonymous and authenticated callers differently.

  schemas:

    # ── Health ──

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    # ── Models ──

    ModelObject:
      type: object
      required: [id, object, created, owned_by]
      properties:
        id:
          type: string
          example: gpt-image-2
        object:
          type: string
          enum: [model]
        created:
          type: integer
          format: int64
          description: Unix timestamp
        owned_by:
          type: string
          example: genpic
        capabilities:
          type: array
          items:
            type: string
          example: [text_to_image, response_format_url]

    ModelList:
      type: object
      required: [object, data]
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: "#/components/schemas/ModelObject"

    # ── Image generation ──

    ImageGenerationRequest:
      type: object
      required: [model, prompt]
      properties:
        model:
          type: string
          description: Model ID as listed in GET /models
          example: gpt-image-2
        prompt:
          type: string
          maxLength: 32000
          description: Text description of the desired image
        n:
          type: integer
          minimum: 1
          maximum: 4
          default: 1
          description: Number of images to generate
        size:
          type: string
          description: |
            Image size. Accepted values depend on the model:
            - GPT Image: `1024x1024` `1536x1024` `1024x1536` `1792x1024` `1024x1792` `auto`
            - Gemini: ignored (use `aspect_ratio`)
            - Wan: `1024*1024` `720*1280` `1280*720` `1280*1280`
          example: "1024x1024"
        quality:
          type: string
          enum: [auto, low, medium, high]
          default: auto
        response_format:
          type: string
          enum: [url, b64_json]
          default: url
        style:
          type: string
          enum: [vivid, natural]
          description: "GPT Image only"
        # Extended params for Gemini (native generateContent / imageConfig)
        aspect_ratio:
          type: string
          description: "Gemini only — maps to `generationConfig.imageConfig.aspectRatio` (e.g. `16:9`, `1:1`)"
        image_size:
          type: string
          description: |
            Gemini `imageConfig.imageSize` — model-specific:
            omit entire `imageConfig` for `gemini-2.5-flash-image` (upstream rejects it; use prompt `--aspect-ratio` hint for non-1:1);
            `gemini-3.1-flash-image-preview`: only `512`, `1K`, `2K`, `4K`;
            `gemini-3-pro-image-preview`: only `1K`, `2K`, `4K`.
        thinking_budget:
          type: integer
          description: "Gemini thinking-capable models only; passed as `generationConfig.thinkingConfig.thinkingBudget`; 0 = disabled"
        # Extended params for Wan
        watermark:
          type: boolean
          description: "Wan only — always true per Aliyun TOS"
        thinking_mode:
          type: boolean
          description: "Wan Pro only — slower but higher quality"
        reference_images:
          type: array
          maxItems: 6
          description: |
            Optional reference images (图生图 / 风格参考). OpenAI → upstream `POST /v1/images/edits`;
            Gemini → `inlineData` parts; Wan → `content[].image` as data URLs.
          items:
            type: object
            required: [b64_json]
            properties:
              mime_type:
                type: string
                description: "image/png | image/jpeg | image/webp | image/gif"
              b64_json:
                type: string
                description: Raw base64 without `data:` prefix; each image ≤ 4 MiB decoded
        # Idempotency
        idempotency_key:
          type: string
          maxLength: 64
          description: |
            Client-supplied idempotency key. If a successful response was
            already recorded for this key within the dedup window (5 min),
            the cached response is returned without calling the upstream again.

    ImageData:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: Signed URL to the generated image (valid for 1 hour)
        b64_json:
          type: string
          description: Base64-encoded PNG/JPEG image data
        revised_prompt:
          type: string
          description: Prompt as revised by the upstream model (when available)
        mime_type:
          type: string
          description: Image MIME type when inline base64 is used (e.g. image/png)

    ImageGenerationResponse:
      type: object
      required: [created, data]
      properties:
        created:
          type: integer
          format: int64
          description: Unix timestamp of the request
        data:
          type: array
          items:
            $ref: "#/components/schemas/ImageData"
        # Non-standard extension fields (clearly marked)
        x_job_id:
          type: string
          description: |
            [Non-standard] Job ID for async result retrieval. Present in Full
            Platform mode; absent in MVP Lite synchronous mode.
        x_provider:
          type: string
          description: |
            [Non-standard] Upstream provider that served this request.
            Values: openai | gemini | wan

    ApiGenerateRequest:
      allOf:
        - $ref: "#/components/schemas/ImageGenerationRequest"
        - type: object
          required: [base_url, api_key]
          properties:
            base_url:
              type: string
              description: Upstream OpenAI-compatible origin (per request; same as the web UI).
            api_key:
              type: string
              description: API key for that upstream (per request).

    JobStatus:
      type: string
      enum: [queued, running, succeeded, failed]

    GenerationJob:
      type: object
      required: [id, object, model, status, created_at]
      properties:
        id:
          type: string
          description: Opaque job id; use as `{job_id}` in GET /jobs/{job_id}
        object:
          type: string
          enum: [generation.job]
        model:
          type: string
        provider:
          type: string
          description: Adapter name (e.g. openai, gemini, wan)
        prompt:
          type: string
          description: |
            Original prompt when the caller may view it (owner session or policy allows).
            Empty when hidden (e.g. other users' jobs without prompt_public).
        visibility:
          type: string
          enum: [private, public]
          description: Community listing; default private
        params:
          description: Generation parameters for remix UIs (owner or feed rules apply)
          allOf:
            - $ref: "#/components/schemas/JobParams"
        status:
          $ref: "#/components/schemas/JobStatus"
        created_at:
          type: integer
          format: int64
          description: Unix timestamp (seconds)
        started_at:
          type: integer
          format: int64
          description: Unix timestamp when generation began
        finished_at:
          type: integer
          format: int64
          description: Unix timestamp when the job completed
        data:
          type: array
          items:
            $ref: "#/components/schemas/ImageData"
          description: Image results when status is succeeded
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          description: Present when status is failed

    JobList:
      type: object
      required: [object, data]
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: "#/components/schemas/GenerationJob"
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor for pagination; null when no more pages

    # ── Auth (M4) ──

    AuthRegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        display_name:
          type: string

    AuthLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    UserPublic:
      type: object
      required: [id, email, display_name]
      properties:
        id:
          type: string
        email:
          type: string
        display_name:
          type: string

    UserSettings:
      type: object
      required: [user_id, community_auto_public, prompt_public]
      properties:
        user_id:
          type: string
        community_auto_public:
          type: boolean
          description: When true, successful jobs may be listed as public automatically
        prompt_public:
          type: boolean
          description: When true, anonymous community viewers may see your prompts

    UserSettingsPatch:
      type: object
      properties:
        community_auto_public:
          type: boolean
        prompt_public:
          type: boolean

    JobVisibilityBody:
      type: object
      required: [visibility]
      properties:
        visibility:
          type: string
          enum: [public, private]

    JobParams:
      type: object
      properties:
        model:
          type: string
        aspect_ratio:
          type: string
        image_size:
          type: string
        size:
          type: string
        n:
          type: integer
        quality:
          type: string
        style:
          type: string

    CommunityFeed:
      type: object
      required: [object, data]
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: "#/components/schemas/GenerationJob"
        next_cursor:
          type: string
          nullable: true

    # ── Chat completions (M2) ──

    ChatCompletionsRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
          description: Image-generation model id (e.g. "gemini/gemini-2.5-flash-image")
          example: gemini/gemini-2.5-flash-image
        messages:
          type: array
          description: |
            Chat messages. The last `user` message provides the generation prompt.
            Content may be a bare string or a multimodal array (text + image_url parts).
          items:
            type: object
            required: [role, content]
            properties:
              role:
                type: string
                enum: [system, user, assistant]
              content:
                description: |
                  Bare string prompt, or array of content parts (`type:"text"` /
                  `type:"image_url"` with `data:` URI for reference images).
                oneOf:
                  - type: string
                  - type: array
                    items:
                      type: object
        n:
          type: integer
          minimum: 1
          maximum: 4
          description: Number of images to generate (default 1)
        stream:
          type: boolean
          description: Must be false or omitted; streaming is not supported.
          enum: [false]
        aspect_ratio:
          type: string
          description: "Gemini: imageConfig.aspectRatio (e.g. '16:9', '1:1')"
          example: "16:9"
        image_size:
          type: string
          description: "Gemini: imageConfig.imageSize (512 | 1K | 2K | 4K)"
          example: 1K
        thinking_budget:
          type: integer
          description: "Gemini: thinkingConfig.thinkingBudget token budget"
        size:
          type: string
          description: "OpenAI / Wan size string (e.g. '1024x1024')"
        quality:
          type: string
          description: "OpenAI quality hint (auto | low | medium | high)"

    ChatCompletionsResponse:
      type: object
      required: [id, object, created, model, choices]
      properties:
        id:
          type: string
          description: Unique completion id
          example: chatcmpl-genpic-1234567890
        object:
          type: string
          enum: [chat.completion]
        created:
          type: integer
          description: Unix timestamp of response creation
        model:
          type: string
          description: Model id echoed from the request
        choices:
          type: array
          items:
            type: object
            required: [index, message, finish_reason]
            properties:
              index:
                type: integer
              message:
                type: object
                required: [role, content]
                properties:
                  role:
                    type: string
                    enum: [assistant]
                  content:
                    type: array
                    description: Multimodal content array
                    items:
                      type: object
                      required: [type]
                      properties:
                        type:
                          type: string
                          enum: [text, image_url]
                        text:
                          type: string
                        image_url:
                          type: object
                          properties:
                            url:
                              type: string
                              description: |
                                `data:<mime>;base64,<b64>` for b64 images,
                                or HTTPS URL for URL-based images.
              finish_reason:
                type: string
                enum: [stop]
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer

    # ── Errors ──

    APIError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [type, message]
          properties:
            type:
              type: string
              description: Machine-readable error category
              example: invalid_request
            code:
              type: string
              description: Optional fine-grained code
              example: prompt_too_long
            message:
              type: string
              description: Human-readable description
              example: "prompt exceeds 32 000 character limit"

  responses:
    BadRequest:
      description: Malformed request (missing fields, invalid JSON)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"
    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"
    Conflict:
      description: Request conflicts with current state (e.g. email already registered)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"
    UnprocessableEntity:
      description: Request is syntactically valid but semantically rejected
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"
    TooManyRequests:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the rate limit window resets
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"
    UpstreamError:
      description: Upstream provider returned an error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"
