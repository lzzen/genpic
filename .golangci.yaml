run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gosec
    - misspell
    - gofmt
    - godot
    - revive

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers: false
          - disableStutteringCheck: false
  gosec:
    excludes:
      # G304 is expected in the embed + file serving patterns
      - G304

issues:
  exclude-rules:
    # Test files may use unexported fields, skip some style checks
    - path: "_test\\.go"
      linters:
        - gosec
        - godot
    # doc.go files have package-level docs without trailing period
    - path: "doc\\.go"
      linters:
        - godot
