<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily · Gemini 3.1 Flash Image Preview — Genpic</title>
  <style>
    :root {
      --bg: #0e1018; --surface: #181b27; --surface2: #20243a; --border: #2b3050;
      --accent2: #4ea8de; --text: #e8eaf6; --muted: #7a83a8; --danger: #f56565; --success: #48bb78;
      --radius: 10px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; padding: 24px; max-width: 720px; margin: 0 auto; }
    header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    h1 { font-size: 1.05rem; font-weight: 600; }
    .badge { font-size: .68rem; color: var(--accent2); border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; background: var(--surface2); }
    a.back { font-size: .82rem; color: var(--accent2); text-decoration: none; margin-left: auto; }
    a.back:hover { text-decoration: underline; }
    label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: 4px; }
    input, textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); padding: 8px 11px; font-size: .85rem; margin-bottom: 14px;
    }
    textarea { min-height: 72px; resize: vertical; font-family: var(--font); }
    .readonly { opacity: .85; cursor: not-allowed; }
    button {
      background: var(--accent2); color: #fff; border: none; border-radius: var(--radius);
      padding: 10px 18px; font-weight: 600; cursor: pointer; font-size: .88rem;
    }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .note { font-size: .72rem; color: var(--muted); line-height: 1.5; margin-top: 14px; padding: 10px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); }
    #out { margin-top: 20px; }
    #out img { max-width: 100%; border-radius: 12px; border: 1px solid var(--border); background: var(--surface2); }
    #status { font-size: .82rem; margin-bottom: 12px; white-space: pre-wrap; word-break: break-word; }
    #status.err { color: var(--danger); }
    #status.ok { color: var(--success); }
    .meta { font-size: .72rem; color: var(--muted); margin-top: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>Gemini 3.1 Flash Image Preview</h1>
    <span class="badge">daily</span>
    <a class="back" href="/">← 返回主界面</a>
  </header>

  <p class="meta">模型固定为 <code>gemini/gemini-3.1-flash-image-preview</code>，请求同源 <code>POST /api/generate</code>（需先启动 <code>mvplite</code>）。</p>

  <div class="field">
    <label for="base-url">Base URL（聚合站）</label>
    <input id="base-url" type="url" placeholder="https://your-aggregator.example.com" autocomplete="off" />
  </div>
  <div class="field">
    <label for="api-key">API Key</label>
    <input id="api-key" type="password" placeholder="sk-…" autocomplete="off" />
  </div>
  <div class="field">
    <label>模型</label>
    <input class="readonly" type="text" readonly value="gemini/gemini-3.1-flash-image-preview" />
  </div>
  <div class="field">
    <label for="prompt">Prompt</label>
    <textarea id="prompt">Daily manual test: a friendly robot mascot icon, flat vector, soft blue and white.</textarea>
  </div>

  <button type="button" id="btn-run">生成（b64_json）</button>

  <div class="note">与主页共用浏览器环境；可在控制台 Application → Local Storage 查看是否已有缓存凭据。本页不写入额外存储。</div>

  <div id="out">
    <div id="status"></div>
    <div id="preview-wrap"></div>
  </div>

  <script>
    const MODEL = 'gemini/gemini-3.1-flash-image-preview';

    async function run() {
      const baseURL = document.getElementById('base-url').value.trim();
      const apiKey = document.getElementById('api-key').value.trim();
      const prompt = document.getElementById('prompt').value.trim();
      const status = document.getElementById('status');
      const wrap = document.getElementById('preview-wrap');
      const btn = document.getElementById('btn-run');

      wrap.innerHTML = '';
      status.className = '';
      status.textContent = '';

      if (!baseURL || !apiKey || !prompt) {
        status.className = 'err';
        status.textContent = '请填写 Base URL、API Key 与 Prompt。';
        return;
      }

      btn.disabled = true;
      status.textContent = '请求中…';

      try {
        const body = {
          base_url: baseURL,
          api_key: apiKey,
          model: MODEL,
          prompt,
          n: 1,
          response_format: 'b64_json',
        };
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (!res.ok) {
          status.className = 'err';
          status.textContent = '失败：' + (data?.error?.message ?? JSON.stringify(data));
          return;
        }

        const images = data.images ?? [];
        if (!images.length) {
          status.className = 'err';
          status.textContent = '未返回图片：' + JSON.stringify(data).slice(0, 500);
          return;
        }

        status.className = 'ok';
        status.textContent = '✓ 成功，共 ' + images.length + ' 张';

        images.forEach((img, i) => {
          const imgEl = document.createElement('img');
          if (img.url) {
            imgEl.src = img.url;
            imgEl.alt = 'result ' + i;
          } else if (img.b64_json) {
            imgEl.src = 'data:image/png;base64,' + img.b64_json;
            imgEl.alt = 'result ' + i;
          }
          wrap.appendChild(imgEl);
          const m = document.createElement('div');
          m.className = 'meta';
          if (img.revised_prompt) m.textContent = '修订 prompt: ' + img.revised_prompt;
          wrap.appendChild(m);
        });
      } catch (e) {
        status.className = 'err';
        status.textContent = '网络错误：' + e.message;
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('btn-run').addEventListener('click', run);
  </script>
</body>
</html>
