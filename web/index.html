<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Genpic MVP Lite — 生图</title>
  <style>
    :root { font-family: system-ui, sans-serif; line-height: 1.5; }
    body { max-width: 52rem; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    label { display: block; margin-top: 0.75rem; font-weight: 600; font-size: 0.85rem; }
    input, textarea, select, button { width: 100%; box-sizing: border-box; margin-top: 0.25rem; padding: 0.5rem; font-size: 1rem; }
    textarea { min-height: 6rem; resize: vertical; }
    button { margin-top: 1rem; cursor: pointer; background: #111; color: #fff; border: none; border-radius: 6px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .hint { font-size: 0.8rem; color: #555; font-weight: normal; }
    #status { margin-top: 1rem; padding: 0.75rem; border-radius: 6px; background: #f4f4f4; white-space: pre-wrap; }
    #status.err { background: #ffe8e8; color: #800; }
    #status.ok { background: #e8ffe8; color: #060; }
    #gallery { margin-top: 1.5rem; display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    #gallery img { width: 100%; height: auto; border-radius: 8px; border: 1px solid #ddd; }
    .row { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.5rem; }
    .row input { width: auto; margin: 0; }
  </style>
</head>
<body>
  <h1>Genpic MVP Lite</h1>
  <p>填写 OpenAI 兼容网关的 <strong>Base URL</strong>、<strong>API Key</strong>、<strong>模型 ID</strong> 与 <strong>提示词</strong>，点击生成。图片会在下方展示（URL 或 base64）。</p>

  <form id="f" autocomplete="off">
    <label>Base URL <span class="hint">例：https://your-newapi.example.com/v1（可不含 /v1，会自动补全）</span></label>
    <input id="base_url" type="url" placeholder="https://api.example.com/v1" required />

    <label>API Key</label>
    <input id="api_key" type="password" placeholder="sk-..." required />

    <label>模型 ID</label>
    <input id="model_id" type="text" placeholder="gpt-image-1 或 dall-e-3" required />

    <label>提示词</label>
    <textarea id="prompt" placeholder="描述你想生成的画面..." required></textarea>

    <label>尺寸 <span class="hint">OpenAI 风格，如 1024x1024</span></label>
    <input id="size" type="text" value="1024x1024" />

    <label>返回格式</label>
    <select id="response_format">
      <option value="url" selected>url（推荐）</option>
      <option value="b64_json">b64_json</option>
    </select>

    <div class="row">
      <input id="remember" type="checkbox" />
      <label for="remember" style="margin:0;font-weight:normal;">将 Base URL / 模型 / 尺寸 存到本机浏览器（不存 API Key）。公共电脑勿勾选。</label>
    </div>

    <button type="submit" id="btn">生成图片</button>
  </form>

  <div id="status" aria-live="polite"></div>
  <div id="gallery"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");
    const gallery = $("gallery");

    function loadRemembered() {
      try {
        const j = JSON.parse(localStorage.getItem("mvplite_prefs") || "{}");
        if (j.base_url) $("base_url").value = j.base_url;
        if (j.model_id) $("model_id").value = j.model_id;
        if (j.size) $("size").value = j.size;
        if (j.response_format) $("response_format").value = j.response_format;
      } catch (_) {}
    }
    function saveRemembered() {
      if (!$("remember").checked) {
        localStorage.removeItem("mvplite_prefs");
        return;
      }
      localStorage.setItem("mvplite_prefs", JSON.stringify({
        base_url: $("base_url").value.trim(),
        model_id: $("model_id").value.trim(),
        size: $("size").value.trim(),
        response_format: $("response_format").value,
      }));
    }

    loadRemembered();

    $("f").addEventListener("submit", async (e) => {
      e.preventDefault();
      statusEl.className = "";
      statusEl.textContent = "请求中…";
      gallery.innerHTML = "";
      $("btn").disabled = true;

      const body = {
        base_url: $("base_url").value.trim(),
        api_key: $("api_key").value.trim(),
        model_id: $("model_id").value.trim(),
        prompt: $("prompt").value.trim(),
        size: $("size").value.trim() || "1024x1024",
        response_format: $("response_format").value,
        n: 1,
      };

      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!data.success) {
          statusEl.className = "err";
          statusEl.textContent = (data.error && data.error.message) || JSON.stringify(data);
          return;
        }
        statusEl.className = "ok";
        statusEl.textContent = "生成成功（" + (data.images && data.images.length) + " 张）";
        saveRemembered();
        (data.images || []).forEach((img) => {
          const el = document.createElement("img");
          el.alt = "generated";
          if (img.url) {
            el.src = img.url;
            el.referrerPolicy = "no-referrer";
          } else if (img.b64_json) {
            el.src = "data:image/png;base64," + img.b64_json;
          }
          gallery.appendChild(el);
        });
      } catch (err) {
        statusEl.className = "err";
        statusEl.textContent = String(err);
      } finally {
        $("btn").disabled = false;
      }
    });
  </script>
</body>
</html>
