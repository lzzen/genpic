# Genpic platform configuration example.
#
# Copy this file to config.yaml (or use environment variables).
# NEVER commit config.yaml — it is in .gitignore.
# All values shown here are defaults or placeholders.

# ── MVP Lite (cmd/mvplite) ─────────────────────────────────────────────────
# go run ./cmd/mvplite -config config.yaml
# Browser can omit ?address= when default_base_url is set. Never put API keys here.
# Listen: mvp_lite.port (overridden by PORT). cmd/genpic does not use this key for HTTP listen.
mvp_lite:
  port: "8080"
  default_base_url: "https://your-openai-compatible-aggregator.example.com"

# ── Full platform HTTP (cmd/genpic) ────────────────────────────────────────
# Listen: server.port (overridden by PORT). mvplite does not use this for HTTP listen.
server:
  port: "8080"
  # Directory for generated images (b64_json → files, served at GET /api/artifacts/...).
  # Default when omitted: data/genpic-artifacts. Set to "-" to disable file writes.
  # Override with env GENPIC_ARTIFACTS_DIR.
  # artifacts_dir: "/var/lib/genpic/artifacts"
  # read_timeout and write_timeout apply to the HTTP server.
  # write_timeout must be larger than the slowest upstream timeout.
  read_timeout: "15s"
  write_timeout: "300s"
  idle_timeout: "120s"

log:
  # format: text (human-readable) or json (production)
  format: "text"
  # level: debug | info | warn | error
  level: "info"

# ── Upstream model id remap (cmd/genpic + cmd/mvplite) ───────────────────────
# Map catalog id (e.g. openai/gpt-image-2) or wire id (e.g. gpt-image-2) to the
# model string sent to the upstream OpenAI-compatible images API or provider.
# Lookup tries catalog id first, then normalized request id, then built-in upstream id.
# model_id_map:
#   "openai/gpt-image-2": "gpt-image-2-all"
#   "gpt-image-2": "gpt-image-2-all"

# ── Upstream provider credentials ──────────────────────────────────────────
# These are SERVER-SIDE keys for calling the upstream aggregator / providers.
# They are NEVER returned to API callers.
# Can also be set via environment variables: OPENAI_BASE_URL, OPENAI_API_KEY, etc.

openai:
  base_url: "https://api.openai.com"
  # api_key: loaded from OPENAI_API_KEY env var
  timeout: "120s"
  max_retries: 2

gemini:
  # base_url should point to your NewAPI aggregator's OpenAI-compatible endpoint.
  base_url: "https://your-newapi-aggregator.example.com"
  # api_key: loaded from GEMINI_API_KEY env var
  timeout: "180s"
  max_retries: 1
  # When the SPA selects Gemini resolution "4K", switch the request model to the given catalog id
  # (keys/values may omit the "gemini/" prefix; they are normalized on load).
  # image_size_4k_model_map:
  #   "gemini/gemini-3.1-flash-image-preview": "gemini/banana-2-4K"
  #   "gemini/gemini-3-pro-image-preview": "gemini/banana-pro-4K"

wan:
  # base_url for DashScope (CN or AP endpoint; key region must match):
  # CN: https://dashscope.aliyuncs.com
  # AP: https://dashscope-intl.aliyuncs.com
  base_url: "https://dashscope.aliyuncs.com"
  # api_key: loaded from WAN_API_KEY env var
  timeout: "180s"
  max_retries: 1

# ── 祥云 meta-provider（多路依次兜底，cmd/genpic）────────────────────────────
# 注册目录模型 `xiangyun/auto`。每次生图按 try_order 依次调用 gemini / openai / wan；
# 上游返回失败（502 类）时换下一个。凭证规则与其它模型一致：请求里若带了 base_url、
# api_key 则优先使用；未带时才用本文件中各 provider 的服务端配置。
# xiangyun:
#   enabled: true
#   try_order: [gemini, openai, wan]
#   models:
#     gemini: gemini/gemini-3.1-flash-image-preview
#     openai: openai/gpt-image-2
#     wan: wan/wan2.7-image

# ── Rate limiting ───────────────────────────────────────────────────────────
rate_limit:
  # Global RPM cap for POST /api/generate (0 = unlimited)
  global_rpm: 0

# ── Idempotency ─────────────────────────────────────────────────────────────
idempotency:
  # TTL for dedup window; must be short enough to avoid user confusion.
  ttl: "5m"

# ── Object storage (S3-compatible: Tencent COS, Aliyun OSS, MinIO) ───────────
# When enabled with bucket + keys, logged-in users upload generation outputs and
# reference images; guests stay on local artifacts / upstream URLs only.
# Secrets: prefer GENPIC_OBJECT_STORAGE_ACCESS_KEY / GENPIC_OBJECT_STORAGE_SECRET_KEY.
# object_storage:
#   enabled: true
#   endpoint: "https://cos.ap-guangzhou.myqcloud.com"
#   region: "ap-guangzhou"
#   bucket: "your-bucket"
#   access_key: ""
#   secret_key: ""
#   public_base_url: "https://your-bucket.cos.ap-guangzhou.myqcloud.com"
#   key_prefix: ""       # optional; omit or "" so objects are users/... at bucket root (recommended for Aliyun virtual-host URLs)
#   # If set (e.g. "genpic"), public_base_url + presigned URLs include the same prefix as PutObject keys.
#   use_path_style: false
#   artifact_mode: "oss"   # oss | both | local  (oss: only OSS; both: disk + OSS; local: disk even if OSS configured)
#   max_fetch_bytes: 26214400
#   fetch_timeout: "60s"
#   url_fetch_hosts: []    # HTTPS hostnames allowed to re-fetch upstream image URLs; empty disables rehost

# ── Database ─────────────────────────────────────────────────────────────────
# MySQL job store for persistent generation history (recommended for production).
# Without this block the server falls back to an in-memory store (no persistence).
# DSN can also be set via DB_DSN environment variable.
#
# Required DSN parameters: parseTime=true  (maps DATETIME columns to time.Time)
# Recommended extras:      charset=utf8mb4&collation=utf8mb4_unicode_ci&loc=Local
#
# database:
#   dsn: "genpic:password@tcp(localhost:3306)/genpic?parseTime=true&charset=utf8mb4"
#   max_open_conns: 10   # default: 10
#   max_idle_conns: 5    # default: 5
#
# Generation rows include optional owner headers (no main-site SSO in this build):
#   X-Genpic-User-Id    — opaque logged-in user id when you add auth later
#   X-Genpic-Session    — stable random id per browser for anonymous history
# The embedded web UI sends X-Genpic-Session automatically (localStorage).

# ── Auth (cookie sessions; requires database.dsn / MySQL) ────────────────────
# Session cookie TTL for POST /api/auth/register and /api/auth/login (Go duration).
# admin_emails — optional list of operator emails (lowercased on load). Those users
# receive `is_admin: true` from GET /api/auth/me and may publish or delete public templates.
# Override / extend with comma-separated GENPIC_ADMIN_EMAILS.
# auth:
#   session_ttl: "720h"
#   admin_emails:
#     - "ops@example.com"
